<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFS Merge Conflict Resolver</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <header>
        <h1>IFS Merge Conflict Resolver</h1>
    </header>

    <main>
        <section id="setup">
            <h2>Project Root</h2>
            <div class="folder-input">
                <div class="path-display" id="pathDisplay">No folder selected</div>
                <button onclick="browseFolder()">Browse...</button>
                <button id="scanBtn" onclick="scanFolder()" disabled>Scan for Conflicts</button>
            </div>
        </section>

        <section id="results" style="display:none;">
            <h2>Conflict Files</h2>
            <div id="fileList"></div>
        </section>

        <section id="resolver" style="display:none;">
            <div class="resolver-header">
                <h2 id="currentFileName"></h2>
                <span id="conflictCounter" class="counter"></span>
            </div>

            <div class="panes">
                <div class="pane local">
                    <div class="pane-label">Local (your changes)</div>
                    <pre id="localPane"></pre>
                </div>
                <div class="pane repo">
                    <div class="pane-label">Incoming (repo changes)</div>
                    <pre id="repoPane"></pre>
                </div>
            </div>

            <div class="actions">
                <button class="btn-local" onclick="resolve('local')">Keep Local</button>
                <button class="btn-repo" onclick="resolve('repo')">Keep Repo</button>
                <button class="btn-both" onclick="resolve('both')">Keep Both</button>
            </div>
        </section>
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
