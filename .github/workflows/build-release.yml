name: Build & Release

# Triggers when you publish a GitHub Release (e.g. v1.0.0)
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:

  # ── macOS .app ──────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .app
        env:
          IFS_LICENSE_SECRET: ${{ secrets.IFS_LICENSE_SECRET }}
        run: pyinstaller build.spec

      - name: Zip the .app bundle
        run: |
          cd dist
          zip -r IFSMergeResolver-mac.zip IFSMergeResolver.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IFSMergeResolver-mac.zip

  # ── Windows installer (.exe setup) ───────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build .exe with PyInstaller
        env:
          IFS_LICENSE_SECRET: ${{ secrets.IFS_LICENSE_SECRET }}
        run: pyinstaller build.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: Build Windows installer
        run: |
          mkdir installer_output
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: pwsh

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/IFSMergeResolver-Setup.exe
